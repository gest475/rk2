name: CI

on: [push, pull_request]

jobs:
  build:
    name: ${{ matrix.compiler }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [gcc, clang]
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: sudo apt update && sudo apt install -y cmake g++ clang
      - name: Configure
        run: |
          if [[ "${{ matrix.compiler }}" == "clang" ]]; then
            cmake -B build -DCMAKE_CXX_COMPILER=clang++ -DCMAKE_CXX_FLAGS="-stdlib=libc++"
          else
            cmake -B build -DCMAKE_CXX_COMPILER=g++
          fi
      - name: Build
        run: cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure
